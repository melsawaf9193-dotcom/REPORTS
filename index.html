<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مقارنة التقارير</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
h2 { text-align: center; }
body { margin: 0; font-family: 'Cairo', sans-serif; direction: rtl; padding: 40px 20px; color: #fff; background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url("https://raw.githubusercontent.com/xhhp1/mechanics/main/images/mechan.png"); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; }
.container { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; max-width: 1500px; margin: auto; }
.box { flex: 0 1 600px; min-width: 550px; padding: 30px; border-radius: 18px; background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(6px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: 0.3s ease; }
.box:hover { transform: translateY(-5px); }
textarea { width: 100%; height: 550px; padding: 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); resize: none; font-family: 'Cairo', sans-serif; background: rgba(15, 23, 42, 0.9); color: #fff; transition: 0.3s; }
textarea:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.4); }
button { display: block; margin: 40px auto; padding: 15px 45px; border: none; border-radius: 50px; cursor: pointer; font-size: 16px; font-weight: bold; background: linear-gradient(90deg,#38bdf8,#6366f1); color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: 0.3s ease; }
button:hover { transform: scale(1.05); }
.box h3 { text-align: center; }
.result { margin: 40px auto 0; padding: 25px; border-radius: 18px; background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(6px); max-width: 1200px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
.missing { background: rgba(239,68,68,0.15); padding: 10px; border-radius: 8px; margin-bottom: 10px; color: #ff6b6b; font-weight: bold; }
hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0; }
</style>
</head>
<body>

<h2>📊 متابعة السجلات</h2>

<div class="container">
  <div class="box">
    <h3>تقرير الإشراف</h3>
    <textarea id="supervision" placeholder="ألصق تقرير الاشراف هنا..."></textarea>
  </div>
  <div class="box">
    <h3>تقرير نائب العمليات</h3>
    <textarea id="operations" placeholder="ألصق تقرير نائب العمليات هنا..."></textarea>
  </div>
</div>

<button onclick="compare()">قارن الآن</button>

<div class="result" id="result"></div>

<script>
let usersMap = {};
fetch("https://mechanic-backend.vercel.app/api/users")
.then(res => res.json())
.then(data => {
  const users = Array.isArray(data) ? data : (data.users || data.data || []);
  users.forEach(user => {
    if(user.discord){
      usersMap[String(user.discord)] = { nickname: user.nickname || "غير معروف", code: user.code || "", isWomen: !!user.isWomen };
    }
  });
});

function getDiscordId(mention){ return mention.replace(/[<@!>]/g,""); }
function formatUser(id){ const cleanId = getDiscordId(id); const user = usersMap[cleanId]; return user ? user.nickname : id; }
function clean(text){ return text.replace(/\*\*/g,"").replace(/ـ+/g,"").replace(/\[.*?\]\(.*?\)/g,""); }

function normalizeLabel(label){
  if(!label) return "";

  label = label
    .replace(/\*\*/g, "")
    .replace(/[إأآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[()]/g, "")
    .replace(/[:：]/g, "")
    .replace(/\s+/g, " ")
    .trim();

  const ignoreList = [
    "مسؤول افتتاح المتجر",
    "المشرف الميداني بروم الكراج",
    "مشرف المنطقه بروم الكراج",
    "مشرف المتدرب بروم الكراج"
  ];

  if (ignoreList.some(item => label.includes(item))) return null;

  const map = {
    // القيادة
    "قياده الكراج": "القياده",
    "قياده": "القياده",
    "القياده": "القياده",

    // مستشار القائد
    "مستشار القائد": "مستشار القائد",
    "المستشار": "مستشار القائد",
    "مستشار": "مستشار القائد",

    // الاشراف
    "المشرف العام": "اشراف عام",
    "اشراف عام": "اشراف عام",
	

    "المشرف الميداني": "اشراف ميداني",
    "اشراف ميداني": "اشراف ميداني",
	"لمشرف الميداني": "اشراف ميداني",

    "مشرفين المناطق": "اشراف المناطق",
    "مشرف المناطق": "اشراف المناطق",
    "مشرف المنطقه": "اشراف المناطق",
    "اشراف المناطق": "اشراف المناطق",

    // المتدربين
    "مشرفين متدربين": "مشرفين متدربين",
    "مشرف متدرب": "مشرفين متدربين",
    "مشرف المتدرب": "مشرفين متدربين",

    // السيدات والمعتمدين
    "السيدات و المعتمدين": "لاعب معتمد والسيدات",
    "السيدات والمعتمدين": "لاعب معتمد والسيدات",
    "لاعب معتمد": "لاعب معتمد والسيدات",
    "لاعب معتمد والسيدات": "لاعب معتمد والسيدات",

    // العمليات
    "العمليات": "العمليات",
    "نائب العمليات": "نائب العمليات",

    // مركز الاتصالات
    "مركز الاتصالات": "مركز الاتصالات",
    "مركز الاتصال": "مركز الاتصالات",

    // الميناء
    "ميناء لوس": "ميناء لوس",
    "فني ميناء لوس": "ميناء لوس",

    "ميناء بوليتو": "ميناء بوليتو",
    "فني ميناء بوليتو": "ميناء بوليتو",

    // البحث والانقاذ
    "البحث والانقاذ": "البحث والانقاذ"
  };

  return map[label] || label;
}

function extractSections(text){
  const sections = {};
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  let currentNormalized = null;
  for (let line of lines) {
    let m = line.match(/^(.+?)\s*:\s*(.*)$/) || line.match(/^(.+?)\s*\(\s*(.*?)\s*\)\s*$/);
    if (m && !line.startsWith("<@")) {
      currentNormalized = normalizeLabel(m[1].trim());
      if (currentNormalized === null) continue;
      (m[2].match(/<@!?\d+>/g) || []).forEach(id => add(id, currentNormalized));
    } else if (currentNormalized !== null) {
      (line.match(/<@!?\d+>/g) || []).forEach(id => add(id, currentNormalized));
    }
  }
  function add(id, normalized){
    const cleanId = getDiscordId(id);
    const user = usersMap[cleanId];
    if (normalized === "لاعب معتمد والسيدات" && user && user.isWomen) return;
    if (!sections[id]) sections[id] = new Set();
    sections[id].add(normalized);
  }
  const out = {};
  for (const id in sections) { out[id] = [...sections[id]]; }
  return out;
}

function checkCodes(text) {
  const lines = text.split("\n").map(l => l.trim());
  let currentSection = ""; let issues = [];
  lines.forEach(line => {
    if (line.includes(":")) { currentSection = line.replace(":", "").trim(); return; }
    if (/^[A-Za-z]\s*-\s*\d+/.test(line)) {
      if (line.replace(/\s+/g, "")[0].toLowerCase() !== "g") issues.push({ section: currentSection, code: line });
    }
  });
  return issues;
}

function findDuplicateCodesBySection(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  let currentSection = ""; const codeMap = {}; const duplicates = [];
  lines.forEach(line => {
    if (line.includes(":")) { currentSection = normalizeLabel(line.replace(":", "").trim()); return; }
    if (currentSection === null) return;
    const match = line.match(/([A-Za-z]\s*-\s*\d+)/);
    if (match) {
      const code = match[1].replace(/\s+/g, "").toUpperCase();
      if (!codeMap[code]) codeMap[code] = {};
      codeMap[code][currentSection] = (codeMap[code][currentSection] || 0) + 1;
    }
  });
  for (const code in codeMap) {
    const secs = Object.keys(codeMap[code]);
    secs.forEach(sec => { if (codeMap[code][sec] > 1) duplicates.push({ code, section: sec, type: "داخل نفس القسم" }); });
    if (secs.length > 1) duplicates.push({ code, sections: secs, type: "بين الأقسام" });
  }
  return duplicates;
}

function checkSpecialViolations(text, allFoundUsers) {
  let issues = [];
  const allCodes = (text.match(/[A-Z]\s*-\s*\d+/gi) || []).map(c => c.replace(/\s+/g, '').toUpperCase());
  const losSection = (() => {
  const m = text.match(/لوس[\s\S]*?(?=\n[^ \n].*?:|$)/i);
  return m ? m[0] : "";
})();

const sandySection = (() => {
  const m = text.match(/ساندي[\s\S]*?(?=\n[^ \n].*?:|$)/i);
  return m ? m[0] : "";
})();

const losCodes = (losSection.match(/[A-Z]\s*-\s*\d+/gi) || [])
  .map(c => c.replace(/\s+/g, "").toUpperCase());

const sandyCodes = (sandySection.match(/[A-Z]\s*-\s*\d+/gi) || [])
  .map(c => c.replace(/\s+/g, "").toUpperCase());
  let inLadies = false;
  text.split("\n").forEach(line => {
    if (line.includes("السيدات") || line.includes("المعتمدين")) inLadies = true;
    else if (line.includes(":") && !line.includes("<@")) inLadies = false;

    if (inLadies) {
      (line.match(/<@!?\d+>/g) || []).forEach(m => {
        const user = usersMap[getDiscordId(m)];
        if (user && user.code && allCodes.includes(user.code.replace(/\s+/g, '').toUpperCase())) {
          issues.push(`خل نائب العمليات يحذف كود [ ${user.code} ] كادر نسائي و يكتفي بالمنشن فقط`);
        }
      });
    }
  });

 allFoundUsers.forEach(id => {
  const user = usersMap[getDiscordId(id)];
  const sections = extractSections(text)[id] || [];

  if (!user || !user.code) return;

  const userCode = user.code.replace(/\s+/g, '').toUpperCase();

if (sections.includes("العمليات")) {
  if (!losCodes.includes(userCode)) {
    issues.push(`خل نائب العمليات يضيف كود العمليات [ ${user.code} ] في لوس`);
  }
}

if (sections.includes("نائب العمليات")) {
  if (!losCodes.includes(userCode)) {
    issues.push(`خل نائب العمليات يضيف كود النائب [ ${user.code} ] في  لوس`);
  }
}

if (sections.includes("مركز الاتصالات")) {
  if (!sandyCodes.includes(userCode)) {
    issues.push(`خل نائب العمليات يضيف كود مركز الاتصالات [ ${user.code} ] في  ساندي`);
  }
}
});
  
  return [...new Set(issues)];
}

function compare(){
  const opsRaw = document.getElementById("operations").value;
  const supRaw = document.getElementById("supervision").value;
  const result = document.getElementById("result");
  if(!opsRaw || !supRaw) { result.innerHTML = "<div class='missing'>يرجى ملء كلا التقريرين للمقارنة.</div>"; return; }

  let output = ""; let hasDifference = false;
  const allFoundUsers = Array.from(new Set([...Object.keys(extractSections(opsRaw)), ...Object.keys(extractSections(supRaw))]));

  let specialIssues = checkSpecialViolations(opsRaw, allFoundUsers);
  if(specialIssues.length > 0) { hasDifference = true; specialIssues.forEach(msg => output += `<div class='missing'> ${msg}</div>`); output += "<hr>"; }

  const codeIssues = checkCodes(opsRaw);
  const duplicates = findDuplicateCodesBySection(opsRaw);
    if (duplicates.length) { hasDifference = true; duplicates.forEach(item => output += `<div class='missing'>الكود ${item.code}   مكرر في ${item.section || item.sections.join(" و ")}</div>`); output += "<hr>"; }
  if (codeIssues.length) { hasDifference = true; codeIssues.forEach(item => output += `<div class='missing'> الكود ${item.code} موجود في ${item.section}</div>`); output += "<hr>"; }

  const sup = extractSections(clean(supRaw));
  const ops = extractSections(clean(opsRaw));
Object.keys(sup).forEach(id => {
  if (!ops[id]) return;

  const supSections = sup[id];
  const opsSections = ops[id];

  const missingSectionsInOps = supSections.filter(sec => !opsSections.includes(sec));
  const wrongSectionsInOps = opsSections.filter(sec => !supSections.includes(sec));

  if (missingSectionsInOps.length || wrongSectionsInOps.length) {
    hasDifference = true;

    output += `
      <div class='missing'>
        ${formatUser(id)}
        <br>
        موجود في تقرير الإشراف: ${supSections.join(" - ")}
        <br>
        موجود في تقرير النائب: ${opsSections.join(" - ")}
      </div>
      عدل القسم في تقرير النائب.
      <hr>
    `;
  }
});
  let missingInOps = {}; let missingInSup = {}; 
  Object.keys(sup).forEach(id => { if (!ops[id]) { let sec = sup[id].join(" - "); if (!missingInOps[sec]) missingInOps[sec] = []; missingInOps[sec].push(formatUser(id)); } });
  Object.keys(ops).forEach(id => { if (!sup[id]) { const user = usersMap[getDiscordId(id)]; const isInLadies = ops[id].includes("لاعب معتمد والسيدات"); if (isInLadies && user && user.code && user.code.toUpperCase().includes("G")) return; let sec = ops[id].join(" - "); if (!missingInSup[sec]) missingInSup[sec] = []; missingInSup[sec].push(formatUser(id)); } });

  for (const s in missingInOps) { hasDifference = true; output += `<div class='missing'>${missingInOps[s].join("<br>")}</div>ضيف في تقرير النائب (${s}).<hr>`; }
  for (const s in missingInSup) { hasDifference = true; output += `<div class='missing'>${missingInSup[s].join("<br>")}</div>ضيف في تقرير الاشراف (${s}).<hr>`; }

  if (!hasDifference) output = "<b>✅ تمام، التقريرين متطابقين وما فيهمش أي نقص.</b>";
  result.innerHTML = output;
}
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
